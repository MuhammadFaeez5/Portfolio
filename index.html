
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muhammad Faeez | AI Engineer & Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              charcoal: '#0a0a0c',
              surface: '#111114',
              accent: '#00d2ff',
              violet: '#7000ff',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Poppins', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            }
          }
        }
      }
    </script>
    <style>
      ::-webkit-scrollbar { width: 3px; }
      ::-webkit-scrollbar-track { background: #0a0a0c; }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

      /* Animation Engine v4 - Luminous Edition */
      .reveal { opacity: 0; transform: translateY(30px); filter: blur(10px); transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
      .reveal-left { opacity: 0; transform: translateX(-50px); filter: blur(5px); transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
      .reveal-right { opacity: 0; transform: translateX(50px); filter: blur(5px); transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
      .scale-up { opacity: 0; transform: scale(0.9); transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); }
      
      .active { opacity: 1 !important; transform: translate(0) scale(1) !important; filter: blur(0) !important; }

      .stagger > * { opacity: 0; transform: translateY(20px); transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
      .active.stagger > * { opacity: 1; transform: translateY(0); }

      .glass {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(25px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      
      .luminous-glow {
        background: radial-gradient(circle at center, rgba(0, 210, 255, 0.12) 0%, transparent 80%);
      }

      @keyframes light-sweep {
        0% { transform: translateX(-100%) skewX(-15deg); }
        100% { transform: translateX(200%) skewX(-15deg); }
      }

      .sweep-effect {
        position: relative;
        overflow: hidden;
      }
      .sweep-effect::after {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 40%; height: 100%;
        background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
        animation: light-sweep 4s infinite linear;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.37.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
  }
}
</script>
</head>
  <body class="bg-charcoal text-gray-100 font-sans antialiased overflow-x-hidden selection:bg-accent selection:text-black">
    <div id="root"></div>
  </body>
</html>
