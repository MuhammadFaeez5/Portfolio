
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muhammad Faeez | AI Engineer & Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              charcoal: '#0F172A', // Slate 900 (Deep, but not pure black)
              surface: '#1E293B',  // Slate 800 (Card backgrounds)
              obsidian: '#F8FAFC', // Inverted for light text on dark
              accent: '#38BDF8',   // Sky 400
              violet: '#818CF8',   // Indigo 400
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Poppins', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            }
          }
        }
      }
    </script>
    <style>
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: #0F172A; }
      ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: #38BDF8; }

      /* Animation Engine v6 - Mid-Tone Edition */
      .reveal { opacity: 0; transform: translateY(30px); filter: blur(8px); transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
      .reveal-left { opacity: 0; transform: translateX(-50px); filter: blur(4px); transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
      .reveal-right { opacity: 0; transform: translateX(50px); filter: blur(4px); transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
      .scale-up { opacity: 0; transform: scale(0.95); transition: all 1s cubic-bezier(0.16, 1, 0.3, 1); }
      
      .active { opacity: 1 !important; transform: translate(0) scale(1) !important; filter: blur(0) !important; }

      .stagger > * { opacity: 0; transform: translateY(20px); transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
      .active.stagger > * { opacity: 1; transform: translateY(0); }

      .glass {
        background: rgba(30, 41, 59, 0.6);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }
      
      .soft-shadow {
        box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.5);
      }

      .hero-gradient {
        background: radial-gradient(circle at top right, rgba(56, 189, 248, 0.08) 0%, transparent 50%),
                    radial-gradient(circle at bottom left, rgba(129, 140, 248, 0.08) 0%, transparent 50%);
      }

      @keyframes slow-pan {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.37.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
  }
}
</script>
</head>
  <body class="bg-charcoal text-slate-300 font-sans antialiased overflow-x-hidden selection:bg-accent selection:text-charcoal">
    <div id="root"></div>
  </body>
</html>
